name: Bootstrap tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  schedule:
    # Runs every Sunday at 6:00 AM UTC
    - cron: '0 6 * * 0'

jobs:
  test-windows-bootstrap:
    name: Test Windows bootstrap script
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest]

    steps:
      - name: Checkout repository (for context or future use)
        uses: actions/checkout@v4

      - name: Run bootstrap script from remote source
        shell: powershell
        run: |
          Write-Output "Downloading and executing bootstrap script..."
          iwr -UseBasicParsing -Headers @{ "Cache-Control" = "no-cache" } `
            "https://raw.githubusercontent.com/senotrusov/windows-bootstrap/main/deploy.ps1" | iex
